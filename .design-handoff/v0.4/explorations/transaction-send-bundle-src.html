<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />

  <template id="__bundler_thumbnail" data-bg-color="#f0eee9">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <!-- Three phone outlines side-by-side suggesting the canvas of artboards -->
      <g fill="none" stroke="#1A7A4A" stroke-width="6">
        <rect x="320" y="180" width="160" height="440" rx="28"/>
        <rect x="520" y="180" width="160" height="440" rx="28"/>
        <rect x="720" y="180" width="160" height="440" rx="28"/>
      </g>
      <!-- ö mark centered above -->
      <g transform="translate(560 60)">
        <rect width="80" height="80" rx="20" fill="#1A7A4A"/>
        <text x="40" y="58" text-anchor="middle"
              font-family="Inter, system-ui, sans-serif"
              font-weight="700" font-size="56"
              fill="#F5F0E8">ö</text>
      </g>
      <!-- A subtle green action bar inside each phone to hint at the CTA -->
      <g fill="#1A7A4A" opacity="0.85">
        <rect x="340" y="550" width="120" height="28" rx="8"/>
        <rect x="540" y="550" width="120" height="28" rx="8"/>
        <rect x="740" y="550" width="120" height="28" rx="8"/>

      <text x="600" y="720" text-anchor="middle"
            font-family="Inter, system-ui, sans-serif"
            font-weight="600" font-size="28"
            fill="#4B5563">öz · send screen</text>
    </svg>

  <link rel="icon" href="../assets/oz-icon.svg" />

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="design-canvas.jsx"></script>
  <script type="text/babel" data-presets="react" src="PressAndHold.jsx"></script>
  <script type="text/babel" data-presets="react" src="CopyRow.jsx"></script>
  <script type="text/babel" data-presets="react" src="SendApproachA.jsx"></script>
  <script type="text/babel" data-presets="react" src="SendApproachB.jsx"></script>
  <script type="text/babel" data-presets="react" src="SendApproachC.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="tx-send"
            title="öz — Send screen (sender view, pending_sender_payment)"
            subtitle="Three angles on what dominates: bank details, the timer, or the trust resume. Click an artboard to focus."
          >
            <DCArtboard id="sa" label="A · Calm — bank details dominate" width={390} height={945} data-screen-label="A Calm">
              <SendApproachA />
            </DCArtboard>
            <DCArtboard id="sb" label="B · Urgency — animated timer is the hero" width={390} height={975} data-screen-label="B Urgency">
              <SendApproachB />
            </DCArtboard>
            <DCArtboard id="sc" label="C · Trust resume — large counterparty card up top" width={390} height={1000} data-screen-label="C Trust">
              <SendApproachC />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

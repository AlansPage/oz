<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<link rel="stylesheet" href="../ui_kits/oz-mobile/components.css" />
<title>Listing card</title>
</head>
<body>
<div class="ds-card" style="min-height: 230px; padding: 24px;">
  <div class="ds-label">Listing card — feed primitive · 1px translateY on press</div>
  <article class="oz-card" style="max-width: 380px;">
    <div class="oz-card__top">
      <div class="oz-card__who">
        <div class="oz-avatar">А</div>
        <div class="oz-card__identity">
          <span class="oz-card__name">Айгерим Қ.</span>
          <span class="oz-card__rating">★ 4.8 · 12</span>
        </div>
      </div>
      <span class="oz-vbadge oz-vbadge--id">ID</span>
    </div>
    <div>
      <div class="oz-card__amount">
        <span class="oz-card__direction" aria-hidden>₸ → ₩</span>
        750 000
      </div>
      <div class="oz-card__rateline">по курсу 3,19</div>
      <div class="oz-card__equivalent">≈ 2 392 500 ₩</div>
      <p class="oz-card__note">Только Kaspi, до 22:00 МСК.</p>
    </div>
    <div class="oz-card__bottom">
      <span class="oz-card__time">5 мин назад</span>
      <div class="oz-card__actions">
        <button class="oz-soft-btn-sm">Связаться</button>
      </div>
    </div>
  </article>
</div>
</body>
</html>

<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Display + headings</title>
</head>
<body>
<div class="ds-card" style="min-height: 200px;">
  <div class="ds-label">Display + headings · Inter</div>
  <div style="display:grid; grid-template-columns: 1fr auto; gap: 6px 24px; align-items: baseline;">
    <div class="oz-display">Откройте Telegram-бот</div>
    <div class="ds-hint">.oz-display · 28 / 700 / -0.01em</div>

    <div class="oz-h1">Введите код из Telegram</div>
    <div class="ds-hint">.oz-h1 · 24 / 700</div>

    <div class="oz-h2">Новое объявление</div>
    <div class="ds-hint">.oz-h2 · 18 / 600</div>

    <div class="oz-h3">Сделка завершена</div>
    <div class="ds-hint">.oz-h3 · 16 / 600</div>
  </div>
</div>
</body>
</html>

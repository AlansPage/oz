<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<link rel="stylesheet" href="../ui_kits/oz-mobile/components.css" />
<title>Bottom sheet — handle + title + helper</title>
</head>
<body>
<div class="ds-card" style="min-height: 280px; padding: 24px;">
  <div class="ds-label">Bottom sheet — drag handle, title, field, helper</div>
  <div style="background: #FFFFFF; border-radius: 24px 24px 0 0; padding: 20px 20px 24px; box-shadow: var(--shadow-pop); max-width: 380px;">
    <div class="oz-sheet__handle"></div>
    <div class="oz-sheet__title">Новое объявление</div>
    <div class="oz-sheet__field">
      <label class="oz-sheet__label">Направление</label>
      <div class="oz-segmented">
        <button class="oz-segmented__btn oz-segmented__btn--active">₸ → ₩</button>
        <button class="oz-segmented__btn">₩ → ₸</button>
      </div>
    </div>
    <div class="oz-sheet__field">
      <label class="oz-sheet__label">Курс</label>
      <div class="oz-input--withsuffix">
        <input class="oz-input" placeholder="3,19" />
        <span class="oz-input__suffix">₩/₸</span>
      </div>
      <div class="oz-sheet__helper">Оставьте пустым для рыночного курса</div>
    </div>
  </div>
</div>
</body>
</html>

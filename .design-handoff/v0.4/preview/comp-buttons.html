<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<link rel="stylesheet" href="../ui_kits/oz-mobile/components.css" />
<title>Buttons — primary, secondary, ghost</title>
</head>
<body>
<div class="ds-card" style="min-height: 220px;">
  <div class="ds-label">Buttons — primary, secondary, ghost</div>
  <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
    <button class="oz-btn oz-btn--primary oz-btn--lg">Войти</button>
    <button class="oz-btn oz-btn--primary">Опубликовать</button>
    <button class="oz-btn oz-btn--secondary">Назад</button>
    <button class="oz-btn oz-btn--ghost">Отмена</button>
    <button class="oz-btn oz-btn--primary" disabled>Подтвердить</button>
  </div>
  <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
    <button class="oz-secondary-btn-sm">Редактировать</button>
    <button class="oz-secondary-btn-sm">Снять</button>
    <button class="oz-soft-btn-sm">Связаться</button>
    <div class="ds-hint" style="margin-left:auto;">.oz-btn · .oz-secondary-btn-sm · .oz-soft-btn-sm</div>
  </div>
</div>
</body>
</html>

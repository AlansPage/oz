<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Radii</title>
</head>
<body>
<div class="ds-card" style="min-height: 170px;">
  <div class="ds-label">Radii — never invent a new one</div>
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items:end;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:72px; height:50px; background:#FFFFFF; border:1px solid #D5C9AF; border-radius:8px;"></div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#111827;">--r-sm</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; color:#6B7280;">8px · chip</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:72px; height:50px; background:#FFFFFF; border:1px solid #D5C9AF; border-radius:12px;"></div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#111827;">--r-md</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; color:#6B7280;">12px · input</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:72px; height:50px; background:#FFFFFF; border:1px solid #D5C9AF; border-radius:16px;"></div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#111827;">--r-lg</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; color:#6B7280;">16px · card</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:72px; height:50px; background:#FFFFFF; border:1px solid #D5C9AF; border-radius:24px;"></div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#111827;">--r-xl</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; color:#6B7280;">24px · sheet, rate</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:50px; height:50px; background:#FFFFFF; border:1px solid #D5C9AF; border-radius:9999px;"></div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#111827;">--r-full</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; color:#6B7280;">pill · avatar · FAB</div>
    </div>
  </div>
</div>
</body>
</html>

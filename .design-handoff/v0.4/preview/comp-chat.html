<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<link rel="stylesheet" href="../ui_kits/oz-mobile/components.css" />
<title>Chat bubbles</title>
</head>
<body>
<div class="ds-card" style="min-height: 240px; padding: 24px;">
  <div class="ds-label">Chat — own = primary-soft fill · other = white + border</div>
  <div style="max-width: 420px;">
    <div class="oz-chat__row oz-chat__row--other">
      <div class="oz-avatar oz-avatar--xs">А</div>
      <div class="oz-chat__bubble oz-chat__bubble--other">
        Здравствуйте! Готовы обменять сегодня?
        <span class="oz-chat__timestamp">14:32</span>
      </div>
    </div>
    <div class="oz-chat__row oz-chat__row--own" style="margin-top: 8px;">
      <div class="oz-chat__bubble oz-chat__bubble--own">
        Да, в течение часа.
        <span class="oz-chat__timestamp">14:34</span>
      </div>
    </div>
    <div class="oz-chat__row oz-chat__row--other" style="margin-top: 8px;">
      <div class="oz-avatar oz-avatar--xs">А</div>
      <div class="oz-chat__bubble oz-chat__bubble--other">
        Хорошо, отправляю реквизиты.
        <span class="oz-chat__timestamp">14:35</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<link rel="stylesheet" href="../ui_kits/oz-mobile/components.css" />
<title>Inputs — rest, focus, with-suffix, error</title>
</head>
<body>
<div class="ds-card" style="min-height: 260px;">
  <div class="ds-label">Inputs — rest, focus, with-suffix, error</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div>
      <label class="oz-sheet__label">Сумма</label>
      <input class="oz-input" placeholder="0" />
    </div>
    <div>
      <label class="oz-sheet__label">Сумма (focused)</label>
      <input class="oz-input is-focused" value="750 000" />
    </div>
    <div>
      <label class="oz-sheet__label">Курс</label>
      <div class="oz-input--withsuffix">
        <input class="oz-input" value="3,19" />
        <span class="oz-input__suffix">₩/₸</span>
      </div>
    </div>
    <div>
      <label class="oz-sheet__label">Код</label>
      <input class="oz-input is-error" value="000000" />
      <div class="oz-sheet__helper" style="color: var(--error);">Неверный или истёкший код.</div>
    </div>
  </div>
</div>
</body>
</html>

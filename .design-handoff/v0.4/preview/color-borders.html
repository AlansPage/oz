<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Borders — warm beige, never grey</title>
</head>
<body>
<div class="ds-card">
  <div class="ds-label">Borders — warm beige, never grey</div>
  <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 24px;">
    <div>
      <div style="background:#FFFFFF; border:1px solid #E5DDCB; border-radius:12px; padding:14px; font-size:14px; color:#4B5563;">
        hairline divider
      </div>
      <div style="margin-top:8px;">
        <div class="ds-swatch__name">--border</div>
        <div class="ds-swatch__hex">#E5DDCB · 1px</div>
      </div>
    </div>
    <div>
      <div style="background:#FFFFFF; border:1px solid #D5C9AF; border-radius:12px; padding:14px; font-size:14px; color:#111827;">
        +7 (XXX) XXX-XX-XX
      </div>
      <div style="margin-top:8px;">
        <div class="ds-swatch__name">--border-strong</div>
        <div class="ds-swatch__hex">#D5C9AF · 1px on inputs</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

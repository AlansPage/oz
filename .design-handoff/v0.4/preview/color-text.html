<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Text scale</title>
</head>
<body>
<div class="ds-card">
  <div class="ds-label">Text scale</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items:start;">
    <div>
      <div style="font-size:18px; color:#111827; font-weight:500; margin-bottom:6px;">Курс готов</div>
      <div class="ds-swatch__name">--text</div>
      <div class="ds-swatch__hex">#111827</div>
    </div>
    <div>
      <div style="font-size:18px; color:#4B5563; font-weight:500; margin-bottom:6px;">Контрагент</div>
      <div class="ds-swatch__name">--text-2</div>
      <div class="ds-swatch__hex">#4B5563</div>
    </div>
    <div>
      <div style="font-size:18px; color:#6B7280; font-weight:500; margin-bottom:6px;">5 минут назад</div>
      <div class="ds-swatch__name">--text-3</div>
      <div class="ds-swatch__hex">#6B7280</div>
    </div>
    <div>
      <div style="font-size:18px; color:#6B6557; font-weight:500; margin-bottom:6px;">placeholder…</div>
      <div class="ds-swatch__name">--text-mute</div>
      <div class="ds-swatch__hex">#6B6557</div>
    </div>
  </div>
</div>
</body>
</html>

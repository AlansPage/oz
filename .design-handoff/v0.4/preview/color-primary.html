<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Primary green — trust + confirmation only</title>
</head>
<body>
<div class="ds-card">
  <div class="ds-label">Primary — trust + confirmation only</div>
  <div class="ds-row" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div class="ds-swatch">
      <div class="ds-swatch__chip" style="background:#1A7A4A"></div>
      <div class="ds-swatch__name">--primary</div>
      <div class="ds-swatch__hex">#1A7A4A</div>
    </div>
    <div class="ds-swatch">
      <div class="ds-swatch__chip" style="background:#156138"></div>
      <div class="ds-swatch__name">--primary-hover</div>
      <div class="ds-swatch__hex">#156138</div>
    </div>
    <div class="ds-swatch">
      <div class="ds-swatch__chip" style="background:#E3F1E8"></div>
      <div class="ds-swatch__name">--primary-soft</div>
      <div class="ds-swatch__hex">#E3F1E8</div>
    </div>
    <div class="ds-swatch">
      <div class="ds-swatch__chip" style="background:#0E3D24"></div>
      <div class="ds-swatch__name">--primary-ink</div>
      <div class="ds-swatch__hex">#0E3D24</div>
    </div>
  </div>
</div>
</body>
</html>

<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Shadows — warm, brown, never grey</title>
</head>
<body>
<div class="ds-card" style="min-height: 170px;">
  <div class="ds-label">Shadows — warm, brown-toned, never grey</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items:center; padding: 14px 0;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width: 100%; height: 56px; background:#FFFFFF; border-radius: 16px; box-shadow: 0 1px 2px rgba(60, 40, 10, 0.04), 0 8px 24px rgba(60, 40, 10, 0.06);"></div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#111827;">--shadow-card</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; color:#6B7280; text-align:center;">cards at rest · rgba(60, 40, 10)</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width: 100%; height: 56px; background:#FFFFFF; border-radius: 16px; box-shadow: 0 4px 12px rgba(60, 40, 10, 0.08), 0 24px 60px rgba(60, 40, 10, 0.12);"></div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:11px; color:#111827;">--shadow-pop</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10px; color:#6B7280; text-align:center;">sheets, menus, popovers</div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<link rel="stylesheet" href="../ui_kits/oz-mobile/components.css" />
<title>Verification badges</title>
</head>
<body>
<div class="ds-card" style="min-height: 170px;">
  <div class="ds-label">Verification — three tiers, weight escalates with trust</div>
  <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center;">
    <span class="oz-vbadge oz-vbadge--phone">тел.</span>
    <span class="oz-vbadge oz-vbadge--id">ID</span>
    <span class="oz-vbadge oz-vbadge--trader">трейдер</span>
    <span class="oz-vbadge oz-vbadge--phone">Телефон подтверждён</span>
    <span class="oz-vbadge oz-vbadge--id">Удостоверение проверено</span>
    <span class="oz-vbadge oz-vbadge--trader">Верифицированный трейдер</span>
  </div>
  <div class="ds-hint">phone: soft tint, no shimmer · ID: solid primary, shimmer · трейдер: gold, shimmer</div>
</div>
</body>
</html>

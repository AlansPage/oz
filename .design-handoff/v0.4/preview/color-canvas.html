<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Canvas + surfaces</title>
</head>
<body>
<div class="ds-card">
  <div class="ds-label">Canvas → elevated → sunken</div>
  <div class="ds-row" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div class="ds-swatch">
      <div class="ds-swatch__chip" style="background:#F5F0E8"></div>
      <div class="ds-swatch__name">--bg</div>
      <div class="ds-swatch__hex">#F5F0E8</div>
    </div>
    <div class="ds-swatch">
      <div class="ds-swatch__chip" style="background:#FFFFFF"></div>
      <div class="ds-swatch__name">--surface</div>
      <div class="ds-swatch__hex">#FFFFFF</div>
    </div>
    <div class="ds-swatch">
      <div class="ds-swatch__chip" style="background:#FAF6EE"></div>
      <div class="ds-swatch__name">--surface-2</div>
      <div class="ds-swatch__hex">#FAF6EE</div>
    </div>
    <div class="ds-swatch">
      <div class="ds-swatch__chip" style="background:#EDE6D8"></div>
      <div class="ds-swatch__name">--surface-sunken</div>
      <div class="ds-swatch__hex">#EDE6D8</div>
    </div>
  </div>
</div>
</body>
</html>

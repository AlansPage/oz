<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Semantic / status colors</title>
</head>
<body>
<div class="ds-card">
  <div class="ds-label">Status — warm, calibrated to beige canvas</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div class="ds-swatch">
      <div style="height:56px; border-radius:10px; background:#FEF3C7; border:1px solid #B45309; display:flex; align-items:center; justify-content:center; color:#B45309; font-weight:500; font-size:13px;">warning</div>
      <div class="ds-swatch__name">--warning / -soft</div>
      <div class="ds-swatch__hex">#B45309 / #FEF3C7</div>
    </div>
    <div class="ds-swatch">
      <div style="height:56px; border-radius:10px; background:#FEE4E2; border:1px solid #B42318; display:flex; align-items:center; justify-content:center; color:#B42318; font-weight:500; font-size:13px;">error</div>
      <div class="ds-swatch__name">--error / -soft</div>
      <div class="ds-swatch__hex">#B42318 / #FEE4E2</div>
    </div>
    <div class="ds-swatch">
      <div style="height:56px; border-radius:10px; background:#DBEAFE; border:1px solid #0B5FB8; display:flex; align-items:center; justify-content:center; color:#0B5FB8; font-weight:500; font-size:13px;">info</div>
      <div class="ds-swatch__name">--info / -soft</div>
      <div class="ds-swatch__hex">#0B5FB8 / #DBEAFE</div>
    </div>
    <div class="ds-swatch">
      <div style="height:56px; border-radius:10px; background:#B98A3A; display:flex; align-items:center; justify-content:center; color:#F5F0E8; font-weight:600; font-size:13px;">трейдер</div>
      <div class="ds-swatch__name">--gold</div>
      <div class="ds-swatch__hex">#B98A3A</div>
    </div>
  </div>
</div>
</body>
</html>
